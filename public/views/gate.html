<div class="gate-scanner">
    <div class="mode-toggle" id="mode-toggle" style="display:flex;gap:0.5rem;padding:0.75rem;justify-content:center;">
        <button class="btn mode-btn active" id="btn-qr" onclick="toggleGateMode('qr')" style="background:#2d6a4f;color:white;padding:0.5rem 1.5rem;min-height:44px;border-radius:8px;border:none;cursor:pointer;font-weight:700;">QR</button>
        <button class="btn mode-btn" id="btn-nfc" onclick="toggleGateMode('nfc')" style="background:#1e293b;color:#64748b;padding:0.5rem 1.5rem;min-height:44px;border-radius:8px;border:none;cursor:pointer;font-weight:700;">NFC</button>
    </div>
    <div class="camera-area" id="camera-area">
        <video id="gate-video" playsinline autoplay muted></video>
    </div>
    <div class="nfc-area" id="nfc-area" style="display:none;align-items:center;justify-content:center;flex-direction:column;min-height:300px;background:#0f172a;border-radius:12px;margin:1rem;gap:1rem;">
        <div class="nfc-icon" style="font-size:4rem;">📶</div>
        <div class="nfc-text" style="color:#95d5b2;font-size:1.1rem;font-weight:600;">Tap NFC card or wristband</div>
    </div>
    <div id="gate-result" class="gate-result" style="display: none;">
        <div class="tap-target"></div>
        <div id="gate-photo" class="photo-area"></div>
        <div class="status-area">
            <div id="gate-status-text" class="status-text"></div>
            <div id="gate-status-detail" class="status-detail"></div>
        </div>
    </div>
</div>
<div class="offline-badge" id="offline-badge">OFFLINE</div>
