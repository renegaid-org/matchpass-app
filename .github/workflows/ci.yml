name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Sync source to Hetzner
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 95.217.39.110 >> ~/.ssh/known_hosts
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='tests' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ deploy@95.217.39.110:/opt/matchpass-app/

      - name: Rebuild stack
        uses: appleboy/ssh-action@v1
        with:
          host: 95.217.39.110
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/matchpass-app/deploy.sh
