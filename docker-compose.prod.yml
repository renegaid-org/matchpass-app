services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3003:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://matchpass:${POSTGRES_PASSWORD}@postgres:5432/matchpass
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchpass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: matchpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U matchpass']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
