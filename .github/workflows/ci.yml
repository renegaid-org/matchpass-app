name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy matchpass-app to 95.217.39.110
        uses: appleboy/ssh-action@v1
        with:
          host: 95.217.39.110
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/matchpass-app/deploy.sh
