name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only permissions. Individual jobs upgrade where needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        # Pinned by commit SHA to defend against tag-hijack of a third-party action.
        # v1 at the time of 2026-04-20 security audit. Update deliberately.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/matchpass-app
            git fetch origin main
            git reset --hard origin/main
            npm ci --production
            sudo systemctl restart matchpass-app
